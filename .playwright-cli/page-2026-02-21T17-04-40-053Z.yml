        - heading "Vi verdsetter personvernet ditt" [level=2] [ref=e11]
      - generic [ref=e13]:
        - text: Vi og partnerne våre lagrer og/eller får tilgang til informasjon på en enhet, slik som informasjonskapsler, og behandler personopplysninger, slik som unike identifikatorer og standardinformasjon sendt av en enhet for personlig tilpasset annonsering og innhold, måling av annonsering og innhold, publikumsundersøkelser og utvikling av tjenester. Med din tillatelse kan vi og våre
        - button "partnere" [ref=e14] [cursor=pointer]
        - text: bruke presise geolokaliseringsdata og identifikasjon gjennom enhetsskanning. Du kan, som beskrevet ovenfor, klikke for å samtykke til våre og våre 1573
        - button "partnere" [ref=e15] [cursor=pointer]
        - text: s databehandling. Alternativt kan du klikke for å nekte å samtykke, eller få tilgang til mer detaljert informasjon og endre preferansene dine før du samtykker. Vær oppmerksom på at en viss behandling av dine personopplysninger kanskje ikke krever ditt samtykke, men du har rett til å protestere mot slik behandling. Dine preferanser gjelder kun for dette nettstedet og vil bli lagret i 13 måneder i IABGPP_HDR_GppString cookie. Du kan endre dine preferanser eller trekke tilbake samtykket når som helst ved å gå tilbake til dette nettstedet og klikke på knappen "Cookie innstillinger" nederst på nettsiden.
